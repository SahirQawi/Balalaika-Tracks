<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SAHIR QAWI - BALALAIKA TRACKS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap');

    :root {
      --neon-cyan: #00FFFF;
      --neon-pink: #DE70A1;
      --bg-black: #080808;
      --safe-bottom: env(safe-area-inset-bottom);
    }

    html, body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-black);
      color: var(--neon-cyan);
      font-family: 'Russo One', sans-serif;
      height: 100%;
      width: 100vw;
      overflow: hidden; 
      overscroll-behavior: none;
    }

    body { display: flex; flex-direction: column; }

    .sticky-top {
      flex-shrink: 0;
      padding: 20px 10px 10px;
      background: var(--bg-black);
      z-index: 10;
      border-bottom: 1px solid #1a1a1a;
      text-align: center;
    }

    .player-header { margin-bottom: 15px; }
    .line-1 { font-size: 20px; letter-spacing: 2px; text-transform: uppercase; display: block; }
    .line-2 { font-size: 9px; letter-spacing: 1.2px; color: var(--neon-pink); display: block; margin-top: 2px; }

    .album-art {
      width: 140px; 
      height: 140px; 
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid var(--neon-pink);
      margin: 0 auto 20px; 
      display: block;
      box-shadow: 0 0 15px rgba(222, 112, 161, 0.2);
    }

    /* --- THE HUB: 60% CONTROLS | 40% INFO --- */
    .now-playing-display {
      margin-bottom: 5px;
      padding: 8px;
      background: rgba(222, 112, 161, 0.05);
      border: 1px solid rgba(222, 112, 161, 0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      min-height: 65px;
    }

    /* 60% Width Group */
    .btn-group {
      display: flex;
      gap: 6px;
      width: 60%;
      justify-content: center;
      flex-shrink: 0;
    }

    .inline-nav {
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-family: 'Russo One', sans-serif;
      font-size: 15px;
      width: 38px;
      height: 38px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .play-pause-inline {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      background: rgba(222, 112, 161, 0.1);
      font-size: 18px;
      width: 44px;
      height: 44px;
    }

    /* 40% Width Group (Info) */
    .title-container {
      flex-grow: 1;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      border-left: 1px solid rgba(222, 112, 161, 0.2);
      padding-left: 12px;
    }

    .meta-line {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 3px;
    }

    .time-left {
      font-size: 9px;
      color: var(--neon-pink);
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    .mini-viz {
      display: none;
      align-items: flex-end;
      gap: 2px;
      height: 10px;
    }

    .bar {
      width: 2px;
      background: var(--neon-pink);
      animation: bounce 0.6s infinite ease-in-out;
    }

    @keyframes bounce {
      0%, 100% { height: 2px; }
      50% { height: 10px; }
    }
    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }

    .paused .bar { animation-play-state: paused !important; }

    #current-track-title {
      font-size: 9px;
      color: #fff;
      text-transform: uppercase;
      line-height: 1.2;
    }

    audio { display: none !important; }

    .playlist-area {
      flex-grow: 1;
      overflow-y: auto;
      background: #0c0c0c;
      padding-bottom: var(--safe-bottom);
    }

    .track {
      padding: 16px 15px;
      border-bottom: 1px solid #111;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .track.active { 
      background: rgba(222, 112, 161, 0.1); 
      border-left: 4px solid var(--neon-pink);
    }

    .track-meta { display: flex; justify-content: space-between; align-items: center; }
    .track-name { font-size: 11px; color: var(--neon-cyan); }
    .track.active .track-name { color: var(--neon-pink); }
    .track-badge { font-size: 8px; color: var(--neon-pink); display: none; }
    .track.active .track-badge { display: inline; }
    .track-duration { font-size: 10px; opacity: 0.6; color: var(--neon-cyan); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--neon-pink); }
  </style>
</head>
<body id="main-body">

  <div class="sticky-top">
    <div class="player-header">
      <span class="line-1">SAHIR QAWI</span>
      <span class="line-2">BALALAIKA TRACKS</span>
    </div>

    <img src="https://i.postimg.cc/qBhBz9sG/Balalaika-image.jpg" alt="Art" class="album-art">

    <div class="now-playing-display" id="display-box">
      <div class="btn-group">
        <button class="inline-nav" onclick="prevTrack()">«</button>
        <button class="inline-nav play-pause-inline" id="main-play-btn" onclick="masterPlay()">▶</button>
        <button class="inline-nav" onclick="nextTrack()">»</button>
      </div>
      
      <div class="title-container">
        <div class="meta-line">
          <span class="time-left" id="time-remaining">0:00</span>
          <div class="mini-viz" id="mini-viz">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
        </div>
        <span id="current-track-title">CLICK PLAY TO START</span>
      </div>
    </div>

    <audio id="main-audio" playsinline></audio>
  </div>

  <div class="playlist-area" id="playlist-container"></div>

<script>
  const tracks = [
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/01_Strings%20of%20the%20Rus.mp3', title: '01. STRINGS OF THE RUS' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/02_Whispers%20of%20Divination.mp3', title: '02. WHISPERS OF DIVINATION' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/03_Tarot%20reading.mp3', title: '03. TAROT READING' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/04_Hut%20with%20chicken%20legs.mp3', title: '04. HUT WITH CHICKEN LEGS' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/05_Lingering%20Spectral.mp3', title: '05. LINGERING SPECTRAL' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/06_%20The%20Wandering%20String.mp3', title: '06. THE WANDERING STRING' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/07_Forest%20watchers.mp3', title: '07. FOREST WATCHERS' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/08_Balalaika%20Instrumental%20.mp3', title: '08. BALALAIKA INSTRUMENTAL' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/09_Three%20Strings%20Beneath%20the%20Birches.mp3', title: '09. THREE STRINGS BENEATH BIRCHES' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/10_%20Sahir%20Qawi%20unfolds.mp3', title: '10. SAHIR QAWI UNFOLDS' }
  ];

  let currentTrackIndex = -1;
  const audio = document.getElementById('main-audio');
  const playlistDiv = document.getElementById('playlist-container');
  const trackTitleDisplay = document.getElementById('current-track-title');
  const timeRemainingDisplay = document.getElementById('time-remaining');
  const playBtn = document.getElementById('main-play-btn');
  const miniViz = document.getElementById('mini-viz');
  const body = document.getElementById('main-body');

  function formatTime(seconds) {
    if (isNaN(seconds) || seconds === Infinity || seconds < 0) return '0:00';
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60);
    return min + ":" + (sec < 10 ? "0" : "") + sec;
  }

  function updateStatus() {
    if (currentTrackIndex !== -1) {
      trackTitleDisplay.innerText = tracks[currentTrackIndex].title;
      miniViz.style.display = 'flex';
      if (audio.paused) {
        body.classList.add('paused');
        playBtn.innerText = '▶';
      } else {
        body.classList.remove('paused');
        playBtn.innerText = 'II';
      }
    }
  }

  audio.ontimeupdate = () => {
    if (audio.duration) {
      const remaining = Math.max(0, audio.duration - audio.currentTime);
      timeRemainingDisplay.innerText = formatTime(remaining);
    }
  };

  function buildPlaylist() {
    playlistDiv.innerHTML = '';
    tracks.forEach((track, index) => {
      const isActive = index === currentTrackIndex;
      const trackEl = document.createElement('div');
      trackEl.className = `track ${isActive ? 'active' : ''}`;
      trackEl.innerHTML = `
        <div class="track-meta">
          <span class="track-name">${track.title}</span>
          <span class="track-duration" id="dur-${index}">${track.duration || '--:--'}</span>
        </div>
        <span class="track-badge">[ NOW PLAYING ]</span>
      `;
      trackEl.onclick = () => playTrack(index);
      playlistDiv.appendChild(trackEl);

      if (!track.duration) {
        const tempAudio = new Audio(track.url);
        tempAudio.onloadedmetadata = () => {
          track.duration = formatTime(tempAudio.duration);
          const dEl = document.getElementById(`dur-${index}`);
          if (dEl) dEl.innerText = track.duration;
        };
      }
    });
  }

  function masterPlay() {
    if (currentTrackIndex === -1) playTrack(0);
    else audio.paused ? audio.play() : audio.pause();
  }

  function playTrack(index) {
    if (index < 0 || index >= tracks.length) return;
    if (currentTrackIndex === index) { masterPlay(); return; }
    currentTrackIndex = index;
    audio.src = tracks[currentTrackIndex].url;
    audio.play();
    updateStatus();
    buildPlaylist();
  }

  function nextTrack() { playTrack((currentTrackIndex + 1) % tracks.length); }
  function prevTrack() { playTrack((currentTrackIndex - 1 + tracks.length) % tracks.length); }

  audio.onplay = updateStatus;
  audio.onpause = updateStatus;
  audio.onended = nextTrack;

  buildPlaylist();
</script>
</body>
</html>
