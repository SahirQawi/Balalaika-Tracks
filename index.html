<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SAHIR QAWI - BALALAIKA TRACKS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap');

    :root {
      --neon-cyan: #00FFFF;
      --neon-pink: #DE70A1;
      --bg-black: #080808;
      --safe-bottom: env(safe-area-inset-bottom);
    }

    html, body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-black);
      color: var(--neon-cyan);
      font-family: 'Russo One', sans-serif;
      height: 100%;
      width: 100vw;
      overflow: hidden; 
      overscroll-behavior: none; /* Prevents "pull to refresh" bounce */
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* --- PORTRAIT STICKY TOP --- */
    .sticky-top {
      flex-shrink: 0;
      padding: 15px 15px 10px;
      background: var(--bg-black);
      z-index: 10;
      border-bottom: 1px solid #1a1a1a;
      text-align: center;
    }

    .player-header { margin-bottom: 8px; }
    .line-1 { font-size: 20px; letter-spacing: 2px; display: block; }
    .line-2 { font-size: 9px; letter-spacing: 1.2px; color: var(--neon-pink); display: block; margin-top: 2px; }

    /* Art scales relative to screen width to fit portrait perfectly */
    .art-container {
      width: 160px;
      height: 160px;
      max-width: 45vw;
      max-height: 45vw;
      margin: 5px auto 12px;
      border: 2px solid var(--neon-pink);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(222, 112, 161, 0.2);
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .album-art {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .now-playing-display {
      margin-bottom: 10px;
      padding: 8px 12px;
      background: rgba(222, 112, 161, 0.05);
      border: 1px solid rgba(222, 112, 161, 0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 10px; 
      min-height: 28px;
      overflow: hidden;
    }

    .now-playing-badge {
      font-size: 7px;
      color: var(--neon-pink);
      white-space: nowrap;
      display: none; 
      z-index: 2;
      background: var(--bg-black);
      padding-right: 5px;
    }

    .scroll-container {
      flex-grow: 1;
      overflow: hidden;
      white-space: nowrap;
    }

    .current-track-title {
      display: inline-block;
      font-size: 10px;
      color: var(--neon-cyan);
      text-transform: uppercase;
      padding-left: 100%;
      animation: marquee 10s linear infinite;
    }

    @keyframes marquee {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-100%, 0); }
    }

    /* Aggressive native bar suppression */
    audio {
      display: none !important;
      visibility: hidden !important;
      position: absolute;
      pointer-events: none;
    }

    .controls-grid {
      display: flex;
      gap: 6px;
      justify-content: space-between;
    }

    .nav-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      padding: 15px 0; /* Optimized for thumb size */
      font-family: 'Russo One', sans-serif;
      font-size: 9px;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .play-btn { background: rgba(0, 255, 255, 0.1); }
    .loop-active { border-color: var(--neon-pink); color: var(--neon-pink); background: rgba(222, 112, 161, 0.1); }

    /* --- SCROLLABLE PLAYLIST --- */
    .playlist-area {
      flex-grow: 1;
      overflow-y: auto;
      background: #0c0c0c;
      -webkit-overflow-scrolling: touch;
      padding-bottom: var(--safe-bottom); /* iOS Home Bar protection */
    }

    .track {
      padding: 16px 15px; /* Larger hit areas for portrait mode */
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
    }

    .track.active { 
      background: rgba(222, 112, 161, 0.1); 
      border-left: 4px solid var(--neon-pink);
      color: var(--neon-pink);
    }

    .track-duration { 
      font-size: 10px; 
      color: var(--neon-cyan); 
      opacity: 0.6;
    }

    .main-visualizer {
      display: none; 
      align-items: flex-end;
      gap: 2px;
      height: 10px;
    }

    .main-bar {
      width: 2px;
      background: var(--neon-pink);
      animation: bounce-small 0.6s infinite ease-in-out;
    }

    @keyframes bounce-small {
      0%, 100% { height: 2px; }
      50% { height: 10px; }
    }

    .paused .main-bar { animation-play-state: paused !important; }
    .paused .current-track-title { animation-play-state: paused !important; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--neon-pink); }
  </style>
</head>
<body id="main-body">

  <div class="sticky-top">
    <div class="player-header">
      <span class="line-1">SAHIR QAWI</span>
      <span class="line-2">BALALAIKA TRACKS</span>
    </div>

    <div class="art-container">
      <img src="https://i.postimg.cc/qBhBz9sG/Balalaika-image.jpg" alt="Balalaika Art" class="album-art">
    </div>

    <div class="now-playing-display" id="display-box">
      <span class="now-playing-badge" id="now-playing-badge">NOW PLAYING</span>
      <div class="main-visualizer" id="main-viz">
        <div class="main-bar"></div>
        <div class="main-bar"></div>
        <div class="main-bar"></div>
      </div>
      <div class="scroll-container">
        <span class="current-track-title" id="current-title">SELECT A TRACK TO START</span>
      </div>
    </div>

    <div class="controls-grid">
      <button class="nav-btn" onclick="prevTrack()">« Prev</button>
      <button class="nav-btn play-btn" onclick="masterPlay()">Play/Pause</button>
      <button id="loop-btn" class="nav-btn" onclick="toggleLoop()">Loop</button>
      <button class="nav-btn" onclick="nextTrack()">Next »</button>
    </div>

    <audio id="main-audio" playsinline></audio>
  </div>

  <div class="playlist-area" id="playlist-container"></div>

<script>
  const tracks = [
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/01_Strings%20of%20the%20Rus.mp3', title: '01. STRINGS OF THE RUS' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/02_Whispers%20of%20Divination.mp3', title: '02. WHISPERS OF DIVINATION' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/03_Tarot%20reading.mp3', title: '03. TAROT READING' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/04_Hut%20with%20chicken%20legs.mp3', title: '04. HUT WITH CHICKEN LEGS' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/05_Lingering%20Spectral.mp3', title: '05. LINGERING SPECTRAL' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/06_%20The%20Wandering%20String.mp3', title: '06. THE WANDERING STRING' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/07_Forest%20watchers.mp3', title: '07. FOREST WATCHERS' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/08_Balalaika%20Instrumental%20.mp3', title: '08. BALALAIKA INSTRUMENTAL' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/09_Three%20Strings%20Beneath%20the%20Birches.mp3', title: '09. THREE STRINGS BENEATH BIRCHES' },
    { url: 'https://raw.githubusercontent.com/SahirQawi/Balalaika-Tracks/5716a5d1471e2bc4a8d3e801329661f17a063f1a/10_%20Sahir%20Qawi%20unfolds.mp3', title: '10. SAHIR QAWI UNFOLDS' }
  ];

  let currentTrackIndex = -1;
  let isLooping = false;
  const audio = document.getElementById('main-audio');
  const playlistDiv = document.getElementById('playlist-container');
  const loopBtn = document.getElementById('loop-btn');
  const displayTitle = document.getElementById('current-title');
  const displayBadge = document.getElementById('now-playing-badge');
  const mainViz = document.getElementById('main-viz');
  const body = document.getElementById('main-body');

  function formatTime(seconds) {
    if (isNaN(seconds) || seconds === Infinity) return '0:00';
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60);
    return min + ":" + (sec < 10 ? "0" : "") + sec;
  }

  function updateDisplayBox() {
    if (currentTrackIndex !== -1) {
      displayTitle.innerText = tracks[currentTrackIndex].title;
      displayBadge.style.display = 'inline-block';
      mainViz.style.display = 'flex';
      displayTitle.style.animation = 'none';
      displayTitle.offsetHeight; 
      displayTitle.style.animation = null;
      if (audio.paused) body.classList.add('paused');
      else body.classList.remove('paused');
    }
  }

  function buildPlaylist() {
    playlistDiv.innerHTML = '';
    tracks.forEach((track, index) => {
      const isActive = index === currentTrackIndex;
      const trackEl = document.createElement('div');
      trackEl.className = `track ${isActive ? 'active' : ''}`;
      const durationText = track.duration || '--:--';
      trackEl.innerHTML = `<span>${track.title}</span><span class="track-duration" id="dur-${index}">${durationText}</span>`;
      trackEl.onclick = () => playTrack(index);
      playlistDiv.appendChild(trackEl);

      if (!track.duration) {
        const tempAudio = new Audio(track.url);
        tempAudio.addEventListener('loadedmetadata', () => {
          track.duration = formatTime(tempAudio.duration);
          const d = document.getElementById(`dur-${index}`);
          if (d) d.innerText = track.duration;
        });
      }
    });
  }

  function masterPlay() {
    if (currentTrackIndex === -1) playTrack(0);
    else audio.paused ? audio.play() : audio.pause();
    updateDisplayBox();
  }

  function playTrack(index) {
    if (index < 0 || index >= tracks.length) return;
    if (currentTrackIndex === index) { masterPlay(); return; }
    currentTrackIndex = index;
    audio.src = tracks[currentTrackIndex].url;
    audio.play().catch(() => { /* handle mobile autoplay block */ });
    updateDisplayBox();
    buildPlaylist();
  }

  function nextTrack() { playTrack((currentTrackIndex + 1) % tracks.length); }
  function prevTrack() { playTrack((currentTrackIndex - 1 + tracks.length) % tracks.length); }
  function toggleLoop() { isLooping = !isLooping; loopBtn.classList.toggle('loop-active', isLooping); }

  audio.onplay = () => updateDisplayBox();
  audio.onpause = () => updateDisplayBox();
  audio.onended = () => isLooping ? (audio.currentTime = 0, audio.play()) : nextTrack();

  buildPlaylist();
</script>
</body>
</html>
